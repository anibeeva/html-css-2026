<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="Att/it-2-logo-png-transparent.png" alt="Лого" width="100" height="100">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Начало</a></li>
                <li><a href="courses.html">Курсове</a></li>
                <li><a href="contacts.html">Контакти</a></li>
                <li><a href="regAndLogin.html">Register & Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 class="centered-text">Регистрация и вход</h2> 
        
        <div class="forms-container">
            <section class="form-box">
                <h3>Регистрация</h3>
                <form>
                    <label>Потребителско име</label>
                    <input type="text">
                    <label>Електронна поща</label>
                    <input type="email">
                    <button type="submit" class="btn">Регистрирай се</button>
                </form>
            </section>

            <section id="login" class="form-box">
                <h3>Вход</h3>
                <form>
                    <label>Потребителско име</label>
                    <input type="text">
                    <label>Парола</label>
                    <input type="password">
                    <button type="submit" class="btn">Влез</button>
                </form>
            </section>
        </div>

        <div class="centered-text" style="margin-top: 30px;">
            <a href="index.html">
                <button type="button" class="btn btn-secondary">Към началната страница</button>
            </a>
        </div>
    </main>
</body>
</html>
